apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kotoba-sled
  namespace: kotoba
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: vultr-block-storage-hdd-retain
  resources:
    requests:
      storage: 40Gi
# NOTE 2026-05-28: a separate `kotoba-ipfs` PVC was attempted but blocked by
# the Vultr account-wide block-storage quota.  As a workaround, the kubo
# sidecar mounts the same `kotoba-sled` PVC under `subPath: ipfs/` while the
# kotoba container keeps `subPath: sled/`.  Promote the kubo blockstore to a
# dedicated PVC once the Vultr quota is raised.
