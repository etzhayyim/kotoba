apiVersion: apps/v1
kind: Deployment
metadata:
  name: kotoba
  namespace: kotoba
  labels:
    app.kubernetes.io/name: kotoba
    app.kubernetes.io/part-of: kotoba-gftd-ai
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: kotoba
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kotoba
        app.kubernetes.io/part-of: kotoba-gftd-ai
    spec:
      imagePullSecrets:
        - name: ghcr-creds

      containers:
        - name: kotoba
          image: ghcr.io/gftdcojp/kotoba:latest
          imagePullPolicy: Always

          env:
            - name: KOTOBA_PORT
              value: "8080"
            - name: KOTOBA_P2P_PORT
              value: "4001"
            - name: RUST_LOG
              value: info
            - name: KOTOBA_STORE_PATH
              value: /data/sled
            - name: KOTOBA_STORAGE_BUDGET_BYTES
              value: "8589934592"
            # IPFS Pinning Service (optional — set kotoba-ipfs-pin Secret to enable)
            # kotobase.gftd.ai IS the pin service; external IPFS is optional secondary
            - name: KOTOBA_IPFS_PIN_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: kotoba-ipfs-pin
                  key: KOTOBA_IPFS_PIN_ENDPOINT
                  optional: true
            - name: KOTOBA_IPFS_PIN_JWT
              valueFrom:
                secretKeyRef:
                  name: kotoba-ipfs-pin
                  key: KOTOBA_IPFS_PIN_JWT
                  optional: true
            # Email E2E vault key (optional)
            - name: KOTOBA_VAULT_KEY
              valueFrom:
                secretKeyRef:
                  name: kotoba-vault
                  key: KOTOBA_VAULT_KEY
                  optional: true
            # Stable agent identity (prevents ephemeral DID rotation on restarts)
            - name: KOTOBA_AGENT_ED25519_HEX
              valueFrom:
                secretKeyRef:
                  name: kotoba-agent-identity
                  key: KOTOBA_AGENT_ED25519_HEX
                  optional: true
            - name: KOTOBA_AGENT_X25519_HEX
              valueFrom:
                secretKeyRef:
                  name: kotoba-agent-identity
                  key: KOTOBA_AGENT_X25519_HEX
                  optional: true
            - name: KOTOBA_AGENT_DID
              valueFrom:
                secretKeyRef:
                  name: kotoba-agent-identity
                  key: KOTOBA_AGENT_DID
                  optional: true

          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: p2p-quic
              containerPort: 4001
              protocol: UDP

          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3

          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3

          resources:
            limits:
              memory: "1Gi"

          volumeMounts:
            - name: sled-data
              mountPath: /data/sled
              subPath: sled

        # ── Sidecar: Kubo (IPFS) daemon ─────────────────────────────────────
        # Provides the cold-tier BlockStore that kotoba's TieredBlockStore
        # writes through (KOTOBA_IPFS_ENDPOINT defaults to localhost:5001).
        # Without this sidecar the cold-put fails silently and content blocks
        # are lost on every pod restart.
        - name: kubo
          image: ipfs/kubo:v0.34.1
          command: ["/bin/sh","-c"]
          args:
            - |
              set -e
              if [ ! -f /data/ipfs/config ]; then
                ipfs init --profile=server,lowpower
              fi
              # Pod-local only (kotoba container reaches us via localhost).
              ipfs config Addresses.API     /ip4/127.0.0.1/tcp/5001
              ipfs config Addresses.Gateway /ip4/127.0.0.1/tcp/8081
              ipfs config Datastore.StorageMax 40GB
              # Reduce libp2p chatter so we don't compete with kotoba's own swarm.
              ipfs config --json Swarm.ConnMgr.LowWater  64
              ipfs config --json Swarm.ConnMgr.HighWater 128
              exec ipfs daemon --migrate=true
          env:
            - name: IPFS_PATH
              value: /data/ipfs
          ports:
            - name: ipfs-api
              containerPort: 5001
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: 5001
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 5001
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            limits:
              memory: "1Gi"
          volumeMounts:
            - name: sled-data
              mountPath: /data/ipfs
              subPath: ipfs

      volumes:
        - name: sled-data
          persistentVolumeClaim:
            claimName: kotoba-sled
